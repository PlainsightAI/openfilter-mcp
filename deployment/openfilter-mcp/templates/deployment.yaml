{{- include "openfilter-mcp.validate" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openfilter-mcp.fullname" . }}
  labels:
    {{- include "openfilter-mcp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "openfilter-mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openfilter-mcp.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "openfilter-mcp.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: openfilter-mcp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: PS_API_URL
              value: {{ required "plainsightApiUrl must be set in overrides/<env>.yaml" .Values.plainsightApiUrl | quote }}
            # Defense-in-depth: Dockerfile.slim bakes both of these, but
            # setting them at the chart layer means a typo in image.repository
            # that pulls a non-slim variant doesn't silently re-enable auth
            # bypass or the semantic-search code path.
            - name: REQUIRE_AUTH
              value: "true"
            - name: ENABLE_CODE_SEARCH
              value: "false"
            {{- if .Values.oauth.asUrl }}
            # OAuth-only mode: per-request bearer JWTs validated against
            # the AS's JWKS. Without OAUTH_AS_URL the slim image fails
            # the REQUIRE_AUTH gate at startup (no token, no AS = no
            # auth path). resourceUrl defaults to http://localhost:3000
            # in the server, which won't match an ingress'd audience —
            # default it from ingress.host so the AS-issued JWT's `aud`
            # always matches the TLS-terminated public URL. Explicit
            # oauth.resourceUrl still wins for the rare case where the
            # audience host differs from the ingress host.
            - name: OAUTH_AS_URL
              value: {{ .Values.oauth.asUrl | quote }}
            - name: OAUTH_RESOURCE_URL
              value: {{ .Values.oauth.resourceUrl | default (printf "https://%s" (required "ingress.host must be set when oauth.asUrl is set (or set oauth.resourceUrl explicitly)" .Values.ingress.host)) | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.container.port }}
              protocol: TCP
          # TCP probes — slim image's HTTP routing for /health is not
          # guaranteed across versions. Tradeoff: a deadlocked process
          # that still binds the port won't be caught.
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
