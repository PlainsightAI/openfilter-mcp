# image.repository/tag come from gitops ArgoCD Image Updater
# (applications/openfilter-mcp/image-tag.yaml), not this file.
replicaCount: 1
plainsightApiUrl: "https://api.prod.plainsight.tech"
oauth:
  asUrl: "https://api.prod.plainsight.tech"
  # resourceUrl defaults to https://<ingress.host> in the chart.
ingress:
  host: mcp.prod.plainsight.tech
# Soft hostname spread — preferred not required, so a single-node
# cluster (or a pinned pool) still schedules. With 2 replicas this
# survives a node drain that a co-located pair would not.
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: openfilter-mcp
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi
