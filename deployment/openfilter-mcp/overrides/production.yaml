# image.tag is rewritten in place on every merge to main by the
# Deployments workflow's image-policy-applier step — the trailing
# $imagepolicy annotation is the marker it keys off. Keep it quoted:
# an all-digit placeholder would otherwise parse as the integer 0.
image:
  repository: us-west1-docker.pkg.dev/plainsightai-prod/oci/openfilter-mcp
  tag: "92f78c9e0a5157b23a2eb66eb1f0c965ca6ef6ea" # {"$imagepolicy": "production:openfilter-mcp:tag"}
replicaCount: 1
plainsightApiUrl: "https://api.prod.plainsight.tech"
oauth:
  asUrl: "https://api.prod.plainsight.tech"
  # resourceUrl defaults to https://<ingress.host> in the chart.
ingress:
  host: mcp.prod.plainsight.tech
# Soft hostname spread — preferred not required, so a single-node
# cluster (or a pinned pool) still schedules. With 2 replicas this
# survives a node drain that a co-located pair would not.
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: openfilter-mcp
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi
