# image.repository/tag come from gitops ArgoCD Image Updater
# (applications/openfilter-mcp/image-tag.yaml), not this file.
replicaCount: 1
plainsightApiUrl: "https://api.staging.plainsight.tech"
oauth:
  asUrl: "https://api.staging.plainsight.tech"
  # resourceUrl defaults to https://<ingress.host> in the chart.
ingress:
  host: mcp.staging.plainsight.tech
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
