# deployments.yaml — Continuous deployment for the managed slim
# openfilter-mcp. On every merge to main, build the slim image
# (Dockerfile.slim) to GAR tagged with the commit SHA.
#
# ArgoCD (the openfilter-mcp ApplicationSet in PlainsightAI/gitops)
# utilizes the ArgoCD Image Updater in GKE to automatically reconcile and
# roll out the new image, avoiding any automated "plainsight-bot" commits
# to this repository.
name: Deployments

permissions:
  contents: read
  id-token: write

concurrency:
  group: deployments
  cancel-in-progress: false   # serialize, don't drop a queued deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Publish Docker image to GAR
        uses: PlainsightAI/gh-actions-public/publish-docker-image@main
        env:
          VERSION: ${{ github.sha }}
        with:
          environment: production

  # Build a PR-tagged image when a PR carries the `preview` label, so a
  # preview ApplicationSet in gitops can pull it.
  preview:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'preview')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Publish Docker image to GAR
        uses: PlainsightAI/gh-actions-public/publish-docker-image@main
        env:
          VERSION: pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
        with:
          environment: production
