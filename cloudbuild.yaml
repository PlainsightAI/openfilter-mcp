# Docker build with GPU-accelerated index building via Cloud Run Jobs
# Triggers (configured in infrastructure/terraform/gcp/artifacts/cloudbuild-triggers.tf):
#   PR builds       → GAR oci registry (ephemeral, for review)
#   Dev tag (v*-dev) → GAR oci registry (dev testing, no DockerHub)
#   Release tag (v*) → DockerHub (production, latest if semver >= current)
#
# The slim build is decoupled from the full build:
#   - index/full steps use allowFailure: true so a failure there does not
#     stop the slim step from running and pushing.
#   - slim waitFor's only the auth prelude (not index/full), so it runs in
#     parallel with the GPU index job (~2-3h) instead of waiting on it.
#
# Dry-run by default — set _DRY_RUN=false in the Terraform trigger to actually push.

substitutions:
  _DRY_RUN: 'true'  # Terraform trigger overrides to "false" for automated runs
  _SLIM_ONLY: 'false'  # Set to "true" to skip GPU indexing and full build
  _DOCKERHUB_REPO: plainsightai/openfilter-mcp
  _GAR_REPO: us-west1-docker.pkg.dev/plainsightai-dev/oci/openfilter-mcp
  _GCS_BUCKET: ${PROJECT_ID}-build-artifacts
  _REGION: us-central1
  _PR_NUMBER: ''  # Set by PR trigger via --substitutions

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/dockerhub-username/versions/latest
      env: 'DOCKERHUB_USERNAME'
    - versionName: projects/${PROJECT_ID}/secrets/dockerhub-token/versions/latest
      env: 'DOCKERHUB_TOKEN'
    - versionName: projects/${PROJECT_ID}/secrets/openfilter-mcp-hf-token/versions/latest
      env: 'HF_TOKEN'

steps:
  # Step 0: Prelude — write the GAR access token and the DockerHub-latest
  # version files. Both the index step and the slim step depend on this
  # output (slim reads /workspace/.latest_version-slim in docker-build.sh),
  # and slim runs in parallel with index, so the lookup MUST happen here —
  # not inside the index step — to avoid a read-before-write race that
  # would make slim treat every release as a downgrade-safe latest bump.
  - id: 'prelude'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        if [[ -n "${_PR_NUMBER}" ]] || [[ "${TAG_NAME}" =~ ^v.*-dev(-slim)?$$ ]] || [[ "${TAG_NAME}" =~ ^v.*-slim-dev$$ ]]; then
          gcloud auth configure-docker us-west1-docker.pkg.dev --quiet
          gcloud auth print-access-token > /workspace/.gar_token
        else
          echo "Release build: GAR auth not needed"
        fi
        # Computed up here in cloud-sdk (which has python3) so the docker
        # steps don't need any JSON tooling. Runs unconditionally — both
        # release and slim-only tags need these files downstream.
        python3 scripts/lookup_latest_version.py --latest-tag latest --suffix= > /workspace/.latest_version
        python3 scripts/lookup_latest_version.py --latest-tag latest-slim --suffix=-slim > /workspace/.latest_version-slim

  # Step 1: Upload source, run GPU job, download index
  - id: 'index'
    waitFor: ['prelude']
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    allowFailure: true  # full-pipeline failures must not block the slim push
    entrypoint: 'bash'
    secretEnv: ['HF_TOKEN']
    args:
      - '-c'
      - |
        set -e
        # Auto-detect slim-only from tag name (e.g. v1.0.0-slim-dev)
        SLIM_ONLY="${_SLIM_ONLY}"
        if [[ "${TAG_NAME}" == *slim* ]]; then SLIM_ONLY=true; fi
        if [[ "$$SLIM_ONLY" == "true" ]]; then echo "SLIM_ONLY: skipping index build"; exit 0; fi
        tar czf /tmp/src.tar.gz --exclude='.git' --exclude='indexes' .
        gsutil cp /tmp/src.tar.gz gs://${_GCS_BUCKET}/builds/${BUILD_ID}/src.tar.gz

        # `gcloud run jobs update` doesn't expose --gpu — switched to `deploy`,
        # which is create-or-update. NVIDIA L4 in us-central1 requires:
        # >= 4 CPU and >= 16Gi memory (Cloud Run Jobs GPU minimum). Quota:
        # 3 L4 GPUs in us-central1 with --no-gpu-zonal-redundancy. Without
        # GPU the build runs llama-cpp-python on CPU at ~30 tok/s and exceeds
        # the 4h task timeout — the compute_50 → CMAKE_ARGS fix above let
        # it compile; this is what lets it actually finish.
        #
        # Cloud Run Jobs with GPU enforce a hard 3600s (1h) per-task ceiling
        # — the 14400s bump on a249aff above doesn't apply when --gpu is set.
        # L4 indexing should finish well inside that; if a future corpus
        # bump pushes past 1h on GPU, the right move is splitting the index
        # pass into batches, not dropping --gpu (CPU was 50-100x slower).
        #
        # cuda-compat-13-2 + LD_LIBRARY_PATH bridge the gap between the
        # CUDA 13.2 toolkit baked into the base image and the (older) host
        # driver Cloud Run provisions. Forward compat is officially scoped
        # to within-major-family upgrades on data center GPUs; cross-major
        # (CUDA 13 toolkit on R5xx/CUDA 12 host driver) is undocumented but
        # worth trying before reverting the toolkit. nvidia-smi is invoked
        # twice — bare and after compat install — so the actual host
        # driver version surfaces in logs regardless of whether the bridge
        # works. If `ggml_cuda_init` still fails, the next move is reverting
        # to nvidia/cuda:12.4.0-devel-ubuntu22.04 (the pre-e378fbf image).
        gcloud run jobs deploy index-builder --region=${_REGION} \
          --image=nvidia/cuda:13.2.1-devel-ubuntu22.04 \
          --command=bash \
          --task-timeout=3600 \
          --gpu=1 \
          --gpu-type=nvidia-l4 \
          --no-gpu-zonal-redundancy \
          --cpu=8 \
          --memory=32Gi \
          --max-retries=0 \
          --set-env-vars=HF_TOKEN="$$HF_TOKEN" \
          --args="-c,set -ex; nvidia-smi || true; apt-get update && apt-get install -y git gcc g++ cmake curl python3 python3-pip cuda-compat-13-2; export LD_LIBRARY_PATH=/usr/local/cuda/compat:\$$LD_LIBRARY_PATH; nvidia-smi || true; curl -LsSf https://astral.sh/uv/install.sh | sh; curl -sSL https://sdk.cloud.google.com | bash -s -- --disable-prompts; export PATH=/root/.local/bin:/root/google-cloud-sdk/bin:\$$PATH; cd /tmp; gcloud storage cp gs://${_GCS_BUCKET}/builds/${BUILD_ID}/src.tar.gz .; tar xzf src.tar.gz; uv python install 3.12; export CMAKE_ARGS='-DCMAKE_CUDA_ARCHITECTURES=75-real;80-real;86-real;89-real;90-real'; uv sync --python 3.12 --group code-search; uv run index; tar czf idx.tar.gz indexes/ openfilter_repos_clones/; gcloud storage cp idx.tar.gz gs://${_GCS_BUCKET}/builds/${BUILD_ID}/idx.tar.gz"

        gcloud run jobs execute index-builder --region=${_REGION} --wait
        gsutil cp gs://${_GCS_BUCKET}/builds/${BUILD_ID}/idx.tar.gz /workspace/
        tar xzf /workspace/idx.tar.gz -C /workspace/

  # Step 2: Full Docker build (GPU image with code-context + indexes)
  - id: 'full-build'
    waitFor: ['index']
    name: 'gcr.io/cloud-builders/docker'
    allowFailure: true  # full-build failures must not block the slim push
    entrypoint: 'bash'
    secretEnv: ['DOCKERHUB_USERNAME', 'DOCKERHUB_TOKEN']
    env: &docker-env
      - 'DRY_RUN=${_DRY_RUN}'
      - 'TAG_NAME=${TAG_NAME}'
      - 'SHORT_SHA=${SHORT_SHA}'
      - '_PR_NUMBER=${_PR_NUMBER}'
      - '_GAR_REPO=${_GAR_REPO}'
      - '_DOCKERHUB_REPO=${_DOCKERHUB_REPO}'
    args:
      - '-c'
      - |
        SLIM_ONLY="${_SLIM_ONLY}"; if [[ "${TAG_NAME}" == *slim* ]]; then SLIM_ONLY=true; fi
        if [[ "$$SLIM_ONLY" == "true" ]]; then echo "SLIM_ONLY: skipping full build"; exit 0; fi
        bash scripts/docker-build.sh --dockerfile Dockerfile.gpu --tag-suffix "" --latest-tag "latest" --platform linux/amd64

  # Step 3: Slim Docker build (no code-context, no indexes, no ML deps).
  # Runs in parallel with the index/full pipeline — depends on prelude
  # for both the PR/dev token and the DockerHub-latest version files
  # (written by the prelude so this step doesn't race the index step).
  - id: 'slim-build'
    waitFor: ['prelude']
    name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    secretEnv: ['DOCKERHUB_USERNAME', 'DOCKERHUB_TOKEN']
    env: *docker-env
    args:
      - '-c'
      - bash scripts/docker-build.sh --dockerfile Dockerfile.slim --tag-suffix "-slim" --latest-tag "latest-slim"

  # Step 4: Cleanup build artifacts from GCS
  - waitFor: ['index', 'full-build', 'slim-build']
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args: ['bash', '-c', 'gsutil -m rm -r gs://${_GCS_BUCKET}/builds/${BUILD_ID}/ || true']

options:
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 100
  logging: CLOUD_LOGGING_ONLY

timeout: '14400s'  # 4 hours - GPU indexing pass over plainsightai/* is ~2-3h
